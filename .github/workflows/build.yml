name: Build APK
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        default: 'https://example.com'
      app_name:
        description: 'App Name'
        required: true
        default: 'MyApp'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.webtoapp.app'
      icon_base64:
        description: 'App icon as base64 (data URI or raw base64)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Apply app config
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_APP_NAME: ${{ github.event.inputs.app_name }}
          INPUT_PKG: ${{ github.event.inputs.package_name }}
          INPUT_ICON: ${{ github.event.inputs.icon_base64 }}
        run: |
          set -e
          echo "URL: $INPUT_URL"
          echo "App: $INPUT_APP_NAME"
          echo "Pkg: $INPUT_PKG"

          # Update app name in strings.xml
          sed -i "s|__APP_NAME__|${INPUT_APP_NAME}|g" app/src/main/res/values/strings.xml

          # Update URL in MainActivity.java
          sed -i "s|__WEBVIEW_URL__|${INPUT_URL}|g" app/src/main/java/com/webtoapp/template/MainActivity.java

          # Update package name
          OLD_PKG="com.webtoapp.template"
          NEW_PKG="$INPUT_PKG"

          sed -i "s|${OLD_PKG}|${NEW_PKG}|g" app/src/main/AndroidManifest.xml
          sed -i "s|${OLD_PKG}|${NEW_PKG}|g" app/build.gradle

          # Move MainActivity to correct package path
          NEW_PATH="app/src/main/java/$(echo $NEW_PKG | tr '.' '/')"
          mkdir -p "$NEW_PATH"
          cp app/src/main/java/com/webtoapp/template/MainActivity.java "$NEW_PATH/MainActivity.java"
          sed -i "s|package com.webtoapp.template|package $NEW_PKG|g" "$NEW_PATH/MainActivity.java"

          # Handle icon (strip data URI prefix if present)
          if [ -n "$INPUT_ICON" ]; then
            ICON_DATA="$INPUT_ICON"
            # Remove data URI prefix if present
            ICON_DATA="$(echo $ICON_DATA | sed 's|data:image/[^;]*;base64,||')"
            echo "$ICON_DATA" | base64 -d > /tmp/icon_raw.png 2>/dev/null && \
            if [ -f /tmp/icon_raw.png ] && [ -s /tmp/icon_raw.png ]; then
              echo "Icon decoded successfully"
              for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p "app/src/main/res/mipmap-$density"
                cp /tmp/icon_raw.png "app/src/main/res/mipmap-$density/ic_launcher.png"
                cp /tmp/icon_raw.png "app/src/main/res/mipmap-$density/ic_launcher_round.png"
              done
            else
              echo "Could not decode icon, using default"
            fi
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
