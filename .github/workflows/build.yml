name: Build APK
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        default: 'https://example.com'
      app_name:
        description: 'App Name'
        required: true
        default: 'MyApp'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.webtoapp.app'
      icon_base64:
        description: 'App icon as base64 (data URI or raw base64)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.6 --distribution-type=bin

      - name: Apply app config
        env:
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_APP_NAME: ${{ github.event.inputs.app_name }}
          INPUT_PKG: ${{ github.event.inputs.package_name }}
          INPUT_ICON: ${{ github.event.inputs.icon_base64 }}
        run: |
          set -e
          NEW_PKG="$INPUT_PKG"

          # Update app name
          sed -i "s|__APP_NAME__|$INPUT_APP_NAME|g" app/src/main/res/values/strings.xml

          # Update WebView URL in template file
          sed -i "s|__WEBVIEW_URL__|$INPUT_URL|g" app/src/main/java/com/webtoapp/template/MainActivity.java

          # Replace package name in app/build.gradle
          sed -i "s|com.webtoapp.template|$NEW_PKG|g" app/build.gradle

          # Move MainActivity to new package path and update package declaration
          NEW_PATH="app/src/main/java/$(echo $NEW_PKG | tr '.' '/')"
          mkdir -p "$NEW_PATH"
          mv app/src/main/java/com/webtoapp/template/MainActivity.java "$NEW_PATH/MainActivity.java"
          sed -i "s|package com.webtoapp.template|package $NEW_PKG|g" "$NEW_PATH/MainActivity.java"

          # Apply custom icon if provided
          if [ -n "$INPUT_ICON" ]; then
            ICON_DATA="$(echo $INPUT_ICON | sed 's|data:image/[^;]*;base64,||')"
            printf '%s' "$ICON_DATA" | base64 -d > /tmp/icon.png 2>/dev/null
            if [ -s /tmp/icon.png ]; then
              for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p "app/src/main/res/mipmap-$d"
                cp /tmp/icon.png "app/src/main/res/mipmap-$d/ic_launcher.png"
                cp /tmp/icon.png "app/src/main/res/mipmap-$d/ic_launcher_round.png"
              done
            fi
          fi

      - name: Build Debug APK
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
